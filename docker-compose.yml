services:
  postgres:
    container_name: postgres
    image: postgres:13
    networks:
      - cloudacademylabs
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonarpasswd
      POSTGRES_DB: sonar
    ulimits:
      nproc: 65535
      nofile:
        soft: 32000
        hard: 40000
    volumes:
      - postgres_data:/var/lib/postgresql/data

  sonarqube:
    container_name: sonarqube
    image: sonarqube:lts
    ports:
      - "9000:9000"
      - "9092:9092"
    networks:
      - cloudacademylabs
    environment:
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonarpasswd
      SONAR_JDBC_URL: "jdbc:postgresql://postgres:5432/sonar"
      SONAR_ES_JAVA_OPTS: -Xms512m -Xmx1g
    depends_on:
      - postgres
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs

networks:
  cloudacademylabs:
    name: cloudacademylabs

volumes:
  postgres_data:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
